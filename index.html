<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jian Zhou</title>
  <meta name="author" content="Jian Zhou">
  <meta name="description" content="Jian Zhou — MPhil candidate at AIML, researching imitation learning, RL, and VLA models for generalist household robots.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" type="text/css" href="./Jian Zhou_files/style.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-17341V1NQ5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-17341V1NQ5');
  </script>
</head>

<body>
  <main class="container">

    <!-- Tab navigation -->
    <nav class="tabs" role="tablist" aria-label="Sections">
      <a class="tabs__link" data-tab="home" href="#home" role="tab">Home</a>
      <a class="tabs__link" data-tab="blog" href="#blog" role="tab">Blog</a>
    </nav>

    <!-- ========== HOME TAB ========== -->
    <section class="tab" id="tab-home" role="tabpanel" aria-labelledby="home">

      <!-- Hero -->
      <header class="hero">
        <div class="hero__text">
          <h1 class="hero__name">Jian Zhou</h1>
          <div class="hero__intro" id="intro"></div>
          <nav class="hero__links">
            <a href="mailto:jianzhou0420@outlook.com">Email</a>
            <a href="https://github.com/jianzhou0420">GitHub</a>
            <a href="https://scholar.google.com/">Scholar</a>
          </nav>
          <p class="hero__meta">Last updated: 2025-11-18</p>
        </div>
        <img class="hero__photo" alt="Jian Zhou" src="./Jian Zhou_files/jian_zhou.jpg">
      </header>

      <!-- Works -->
      <section class="section">
        <h2 class="section__title">Publications &amp; Works</h2>
        <div id="works"></div>
      </section>

    </section>

    <!-- ========== BLOG TAB ========== -->
    <section class="tab" id="tab-blog" role="tabpanel" aria-labelledby="blog" hidden>
      <header class="tab__header">
        <h1 class="tab__title">Blog</h1>
        <p class="tab__lede">Notes on imitation learning, VLA models, and research in progress.</p>
      </header>
      <div id="blog"></div>
    </section>

    <footer class="footer">
      &copy; <span id="year"></span> Jian Zhou
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Tab switching (hash-based)
    (function () {
      const tabs = document.querySelectorAll('.tabs__link');
      const panels = document.querySelectorAll('.tab');

      function activate(name) {
        tabs.forEach(t => t.classList.toggle('is-active', t.dataset.tab === name));
        panels.forEach(p => {
          const match = p.id === 'tab-' + name;
          p.hidden = !match;
        });
        window.scrollTo({ top: 0 });
      }

      function current() {
        const h = (location.hash || '').replace('#', '');
        return (h === 'blog') ? 'blog' : 'home';
      }

      window.addEventListener('hashchange', () => activate(current()));
      activate(current());
    })();

    // Load partials
    fetch('src/intro.html')
      .then(r => r.text())
      .then(html => { document.getElementById('intro').innerHTML = html; })
      .catch(err => console.error('Failed to load intro.html:', err));

    fetch('src/works.html')
      .then(r => r.text())
      .then(html => { document.getElementById('works').innerHTML = html; })
      .catch(err => console.error('Failed to load works.html:', err));

    fetch('src/blog.html')
      .then(r => r.text())
      .then(html => { document.getElementById('blog').innerHTML = html; })
      .catch(err => console.error('Failed to load blog.html:', err));
  </script>
</body>
</html>
